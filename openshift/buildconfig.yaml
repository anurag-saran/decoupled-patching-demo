--- 
# ImageStream + binary BuildConfig. Build in-cluster from the local repo — no external
# registry required. Usage:
#   oc apply -f openshift/buildconfig.yaml
#   oc start-build decoupled-patching-demo --from-dir=. --follow
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: decoupled-patching-demo
  labels:
    app: decoupled-patching-demo
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: decoupled-patching-demo
  labels:
    app: decoupled-patching-demo
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: openshift/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: decoupled-patching-demo:latest
